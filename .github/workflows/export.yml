name: Export and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'デプロイ先バージョン（例: v1, v2）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    name: Export Game
    steps:
      - uses: actions/checkout@v4

      - name: Export Godot project
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          use_preset_export_path: true

      - name: Debug build directory
        run: find build/ -type f | head -30

      - name: Determine deploy directory
        id: deploy-dir
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dir=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "dir=draft" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/Web
          destination_dir: ${{ steps.deploy-dir.outputs.dir }}
          keep_files: true
